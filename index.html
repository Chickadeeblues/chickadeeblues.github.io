<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EndoCute - Suivi du cycle & Symptômes</title>

  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
<div id="app" class="app-container">

  <!-- MAIN CONTENT AREA -->
  <main class="content-area">
    <!-- Tab 1: Daily Notes -->
    <section id="tab-daily-notes" class="tab-content active">
      <!-- app.js remplira dynamiquement -->
    </section>

    <!-- Tab 2: Diète -->
    <section id="tab-diet" class="tab-content">
      <!-- app.js remplira dynamiquement -->
    </section>

    <!-- Tab 3: Recettes -->
    <section id="tab-recipes" class="tab-content" style="padding-top:20px;">
      <div style="margin-bottom: 20px;">
        <input type="text" id="main-search-bar" placeholder="Rechercher une recette ou un ingrédient..."
               style="width: 100%; padding: 14px 20px; border-radius: 25px; border: none; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); font-family: 'Outfit'; font-weight: 600; outline: none; font-size:1rem;" />
      </div>
      <div id="recipe-results-container" style="display:flex; flex-direction:column; gap:15px; padding-bottom:20px;">
      </div>
    </section>

    <!-- Tab 3: History -->
    <section id="tab-history" class="tab-content">
      <h2 class="section-title" style="text-align: center; margin-bottom: 20px;">Mon Suivi</h2>

      <div id="history-streaks-container" style="display:flex; justify-content:center; margin-bottom:20px;"></div>

      <div class="card" style="padding: 15px; margin-bottom: 20px;">
        <h3 style="font-size: 1rem; margin-bottom: 15px; color: var(--primary);">Évolution des douleurs</h3>
        <div id="history-graph-container"
             style="min-height: 150px; display: flex; align-items: flex-end; justify-content: space-around; padding-bottom: 10px;">
          <p style="color: #94a3b8; font-size: 0.8rem;">Chargement du graphique...</p>
        </div>
      </div>

      <div style="display: flex; align-items: center; margin: 25px 0;">
        <hr style="flex: 1; border: none; border-top: 1px solid #e2e8f0;">
        <span
                style="padding: 0 10px; color: #94a3b8; font-size: 0.8rem; font-weight: 600; text-transform: uppercase;">Notes
            Quotidiennes</span>
        <hr style="flex: 1; border: none; border-top: 1px solid #e2e8f0;">
      </div>

      <div id="history-notes-container">
      </div>
    </section>

    <!-- Tab 4: Settings -->
    <section id="tab-settings" class="tab-content">
      <!-- app.js remplira dynamiquement -->
    </section>
  </main>

  <!-- BOTTOM NAVIGATION -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-target="tab-daily-notes">
      <span>Notes</span>
    </button>
    <button class="nav-item" data-target="tab-diet">
      <span>Diète</span>
    </button>
    <button class="nav-item" data-target="tab-recipes">
      <span>Recettes</span>
    </button>
    <button class="nav-item" data-target="tab-history">
      <span>Historique</span>
    </button>
    <button class="nav-item" data-target="tab-settings">
      <span>Paramètres</span>
    </button>
  </nav>

</div>
</body>

</html>
