<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EndoCute - Suivi du cycle & Symptômes</title>

  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
<div id="app" class="app-container">

  <!-- MAIN CONTENT AREA -->
  <main class="content-area">
    <!-- Tab 1: Daily Notes -->
    <section id="tab-daily-notes" class="tab-content active">
      <!-- app.js remplira dynamiquement -->
    </section>

    <!-- Tab 2: Diète -->
    <section id="tab-diet" class="tab-content">
      <!-- app.js remplira dynamiquement -->
    </section>

    <!-- Tab 3: History -->
    <section id="tab-history" class="tab-content">
      <div class="placeholder-card">
        <div class="icon-history">📊</div>
        <h2>Historique</h2>
        <p>Vos graphiques d'évolution apparaîtront ici.</p>
      </div>
    </section>

    <!-- Tab 4: Settings -->
    <section id="tab-settings" class="tab-content">
      <!-- app.js remplira dynamiquement -->
    </section>
  </main>

  <!-- BOTTOM NAVIGATION -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-target="tab-daily-notes">
      <span>Notes</span>
    </button>
    <button class="nav-item" data-target="tab-diet">
      <span>Diète</span>
    </button>
    <button class="nav-item" data-target="tab-history">
      <span>Historique</span>
    </button>
    <button class="nav-item" data-target="tab-settings">
      <span>Paramètres</span>
    </button>
  </nav>

</div>
</body>

</html>
